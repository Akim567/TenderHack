services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    environment:
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - .:/app
    command: sh ./scripts/docker-start.sh
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
